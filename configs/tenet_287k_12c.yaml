name: tenet_287k_12c

model:
  type: tenet
  n_channels: [16, 24, 24, 24]
  n_strides: [2, 1, 1]
  n_ratios: [2, 2, 2]
  n_layers: [1, 1, 1]
  kernel_size: 9
  in_channels: 13
  num_classes: 12
  dropout: 0.1

audio:
  sample_rate: 16000
  n_mels: 16
  n_mfcc: 13
  win_length: 512
  hop_length: 256

train:
  batch_size: 1024
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  early_stop_patience: 5
  seed: 123
